# Full stack (SKU-2) — the complete loop in one command:
#   edge gateway  ->  Mosquitto broker  ->  historian  ->  TimescaleDB
#
#   docker compose -f docker-compose.full.yml up -d --build
#
# Broker note: Mosquitto (EPL/EDL, genuinely open source) — the pipe is proven
# against it. EMQX was dropped: as of v5.9.0 EMQX moved to the BSL license (not
# open source), and the last Apache version (5.8.x) is frozen. Mosquitto is
# single-node; when multi-site scale needs clustering, revisit (NanoMQ, HiveMQ
# CE, or pinned EMQX 5.8) — a config change, since everything is broker-agnostic.
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16   # open source; 'latest for PG16'
    environment:
      - POSTGRES_USER=wellfobes
      - POSTGRES_PASSWORD=wellfobes
      - POSTGRES_DB=fleet
    ports: ["5433:5432"]
    volumes:
      - ./center/infra/initdb:/docker-entrypoint-initdb.d:ro
      - fleet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellfobes -d fleet"]
      interval: 3s
      timeout: 3s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    command: ["sh", "-c", "printf 'listener 1883\\nallow_anonymous true\\n' > /m.conf && exec mosquitto -c /m.conf"]

  edge-gateway:
    build: { context: ., dockerfile: edge/Dockerfile }
    environment:
      - MQTT_HOST=mqtt          # <-- same broker the historian subscribes to
      - MQTT_PORT=1883
      - EDGE_SITE=PLANT12
      - EDGE_GATEWAY=GW-A
      - EDGE_SOURCE=simulated
      - EDGE_KEEPALIVE_S=30
      - EDGE_BUFFER_PATH=/data/outbox.db   # durable buffer (survives restart)
      - EDGE_CONFIG_URL=http://config-service:8080   # management plane
    depends_on: [mqtt, config-service]
    volumes:
      - edge_buffer:/data

  edge-gateway-plant30:
    build: { context: ., dockerfile: edge/Dockerfile }
    depends_on: [mqtt, config-service]
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - EDGE_SITE=PLANT30
      - EDGE_GATEWAY=GW-A
      - EDGE_SOURCE=simulated
      - EDGE_KEEPALIVE_S=30
      - EDGE_BUFFER_PATH=/data/outbox.db
      - EDGE_CONFIG_URL=http://config-service:8080
    volumes:
      - edge_buffer_p30:/data

  historian:
    build: { context: ., dockerfile: center/Dockerfile }
    depends_on:
      timescaledb: { condition: service_healthy }
      mqtt:        { condition: service_started }
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - SUB_SITE=+
      - SUB_GATEWAY=+
      - POSTGRES_DSN=postgresql://wellfobes:wellfobes@timescaledb:5432/fleet

  config-service:
    build: { context: ., dockerfile: center/Dockerfile }
    command: ["uvicorn", "config_service.main:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      timescaledb: { condition: service_healthy }
    ports: ["8080:8080"]
    environment:
      - POSTGRES_DSN=postgresql://wellfobes:wellfobes@timescaledb:5432/fleet

  console:
    build: { context: ./console, dockerfile: Dockerfile }
    depends_on: [config-service]
    ports: ["3100:80"]     # operator console -> http://localhost:3100

volumes:
  fleet_pgdata:
  edge_buffer:
  edge_buffer_p30:
