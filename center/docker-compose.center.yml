# Central platform (SKU-2) — self-contained: TimescaleDB + Mosquitto + historian.
#   docker compose -f center/docker-compose.center.yml up -d --build
#
# Mosquitto (open source) as broker — see docker-compose.full.yml for the EMQX
# licensing note. To use your existing TimescaleDB, delete the timescaledb
# service and point historian's POSTGRES_DSN at it.
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_USER=wellfobes
      - POSTGRES_PASSWORD=wellfobes
      - POSTGRES_DB=fleet
    ports: ["5433:5432"]
    volumes:
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro
      - fleet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellfobes -d fleet"]
      interval: 3s
      timeout: 3s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    command: ["sh", "-c", "printf 'listener 1883\\nallow_anonymous true\\n' > /m.conf && exec mosquitto -c /m.conf"]

  historian:
    build:
      context: ..
      dockerfile: center/Dockerfile
    depends_on:
      timescaledb: { condition: service_healthy }
      mqtt:        { condition: service_started }
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - SUB_SITE=+
      - SUB_GATEWAY=+
      - POSTGRES_DSN=postgresql://wellfobes:wellfobes@timescaledb:5432/fleet

volumes:
  fleet_pgdata:
