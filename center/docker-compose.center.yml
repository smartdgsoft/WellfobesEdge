# Central platform (SKU-2) — self-contained: TimescaleDB + EMQX + historian.
# One command, nothing external:
#   docker compose -f center/docker-compose.center.yml up -d --build
#
# The DB auto-applies the migration on first start (infra/initdb/*.sql).
# To use YOUR existing TimescaleDB instead, delete the `timescaledb` service and
# point historian's POSTGRES_DSN at it.
services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      - POSTGRES_USER=wellfobes
      - POSTGRES_PASSWORD=wellfobes
      - POSTGRES_DB=fleet
    ports: ["5433:5432"]        # 5433 on host to avoid clashing with your prod PG
    volumes:
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro
      - fleet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellfobes -d fleet"]
      interval: 3s
      timeout: 3s
      retries: 20

  emqx:
    image: emqx/emqx:5
    ports: ["1883:1883", "18083:18083"]   # mqtt + dashboard (admin/public)
    volumes:
      - ./infra/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro

  historian:
    build:
      context: ..
      dockerfile: center/Dockerfile
    depends_on:
      timescaledb: { condition: service_healthy }
      emqx:        { condition: service_started }
    environment:
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - SUB_SITE=+
      - SUB_GATEWAY=+
      - POSTGRES_DSN=postgresql://wellfobes:wellfobes@timescaledb:5432/fleet

volumes:
  fleet_pgdata:
