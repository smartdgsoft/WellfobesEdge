## EMQX (open source, Apache-2.0) — central broker.
## Minimal Phase-1 config: anonymous MQTT on 1883 for the slice.
## Harden before production (WEP-001 §10): disable anonymous, add per-gateway
## auth (built-in DB / JWT), enable TLS on 8883, and cluster for scale.
listeners.tcp.default {
  bind = "0.0.0.0:1883"
}
allow_anonymous = true
