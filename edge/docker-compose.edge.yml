# SKU-1 standalone edge. Build context is the REPO ROOT so the Dockerfile can
# read shared/, but it copies only shared/ + edge/ — never center/.
#   docker compose -f edge/docker-compose.edge.yml up --build
#
# For a real customer deployment you typically DON'T run this broker — you point
# EDGE at the customer's own broker (set MQTT_HOST/PORT) or their MES's Sparkplug
# endpoint. The mosquitto here is just so the slice runs on a laptop out of the box.
services:
  mqtt:
    image: eclipse-mosquitto:2
    # No host port publish: the gateway reaches this broker over the compose
    # network as mqtt:1883. Publishing 1883 to the host clashes with any other
    # broker already bound there (e.g. a full-stack deployment). Uncomment to
    # expose it to host tools on a free port, e.g. ["1884:1883"].
    # ports: ["1884:1883"]
    command: ["sh", "-c", "printf 'listener 1883\\nallow_anonymous true\\n' > /m.conf && exec mosquitto -c /m.conf"]

  edge-gateway:
    build:
      context: ..
      dockerfile: edge/Dockerfile
    depends_on: [mqtt]
    volumes:
      - edge_buffer_solo:/data
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - EDGE_SITE=PLANT12
      - EDGE_GATEWAY=GW-A
      - EDGE_SOURCE=simulated
      - EDGE_KEEPALIVE_S=30
      - EDGE_BUFFER_PATH=/data/outbox.db
      # Standalone: full store-and-forward, exactly as in the centered stack.
      # The broker's QoS 1 PUBACK confirms delivery, so no center is required.
      - EDGE_ACK_MODE=broker

volumes:
  edge_buffer_solo:
