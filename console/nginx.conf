server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: unknown routes fall back to index.html
  location / { try_files $uri $uri/ /index.html; }

  # Proxy API calls to the center's config-service (compose service name).
  location /api/ {
    proxy_pass http://config-service:8080/;
    proxy_set_header Host $host;
  }
}
